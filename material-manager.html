<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>曼纽考 视频素材库</title>
<style>
:root {
  --bg: #1a1a1a;
  --panel: #232323;
  --panel2: #2a2a2a;
  --border: #333;
  --border-soft: #2e2e2e;
  --text: #e8e8e8;
  --text-soft: #aaa;
  --text-dim: #777;
  --accent: #4f9eff;
  --warn: #ff9a3c;
  --good: #4ade80;
  --bad: #f87171;
  --tag: #3a3a3a;
  --hover: #2f2f2f;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 13px; line-height: 1.5; }
button { font: inherit; cursor: pointer; background: var(--panel2); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 4px 10px; }
button:hover { background: var(--hover); border-color: var(--accent); }
button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
button.primary:hover { background: #6fb0ff; }
button.sm { padding: 2px 6px; font-size: 11px; }
input, select, textarea { font: inherit; background: var(--panel2); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; outline: none; }
input:focus, select:focus { border-color: var(--accent); }

.topbar { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: var(--panel); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; flex-wrap: wrap; }
.topbar h1 { font-size: 16px; font-weight: 600; }
.topbar .stats { display: flex; gap: 16px; color: var(--text-soft); font-size: 12px; }
.topbar .stats b { color: var(--text); font-weight: 600; }
.topbar .grow { flex: 1; }
.topbar input.search { width: 240px; }

.tabs { display: flex; gap: 4px; padding: 8px 16px 0 16px; background: var(--panel); border-bottom: 1px solid var(--border); overflow-x: auto; flex-wrap: nowrap; }
.tab { padding: 8px 14px; background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--text-soft); border-radius: 0; white-space: nowrap; }
.tab:hover { color: var(--text); background: transparent; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab .cnt { color: var(--text-dim); font-size: 11px; margin-left: 4px; }
.tab.active .cnt { color: var(--accent); }

.toolbar { display: flex; gap: 8px; align-items: center; padding: 8px 16px; background: var(--panel2); border-bottom: 1px solid var(--border-soft); flex-wrap: wrap; }
.toolbar label { color: var(--text-soft); font-size: 12px; }
.toolbar select, .toolbar input { font-size: 12px; padding: 3px 6px; }

.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead th { background: var(--panel); color: var(--text-soft); text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); position: sticky; top: 0; font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; z-index: 10; }
tbody td { padding: 6px 10px; border-bottom: 1px solid var(--border-soft); vertical-align: middle; }
tbody tr:hover { background: var(--hover); }
tbody tr.new { background: rgba(79, 158, 255, 0.06); }
tbody tr.deleted { opacity: 0.45; }
tbody tr.deleted td:first-child::before { content: "🗑"; margin-right: 4px; }

.desc-cell { min-width: 260px; max-width: 380px; }
.desc-cell .desc { padding: 4px 6px; border-radius: 3px; cursor: text; min-height: 24px; word-break: break-word; }
.desc-cell .desc:hover { background: var(--panel2); }
.desc-cell .desc:focus { background: var(--panel2); outline: 1px solid var(--accent); }
.desc-cell .desc[data-empty="true"]::before { content: "点击补充描述…"; color: var(--text-dim); }

.reuse { display: inline-flex; align-items: center; gap: 4px; }
.reuse button { width: 22px; height: 22px; padding: 0; font-size: 14px; line-height: 1; }
.reuse .cnt { min-width: 28px; text-align: center; font-weight: 600; }
.reuse.hot .cnt { color: var(--warn); }
.reuse.zero .cnt { color: var(--text-dim); }

.tag { display: inline-block; background: var(--tag); color: var(--text-soft); padding: 1px 6px; border-radius: 10px; font-size: 11px; margin-right: 3px; margin-top: 2px; cursor: pointer; }
.tag:hover { color: var(--bad); }
.tag.add { color: var(--text-dim); cursor: pointer; }
.tag.add:hover { color: var(--accent); }

.note { color: var(--text-dim); font-size: 11px; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: text; padding: 4px 6px; border-radius: 3px; }
.note:hover { color: var(--text); background: var(--panel2); }
.note:focus { background: var(--panel2); outline: 1px solid var(--accent); }

.status-pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; cursor: pointer; border: 1px solid var(--border); }
.status-pill.local { background: rgba(74, 222, 128, 0.12); color: var(--good); border-color: rgba(74, 222, 128, 0.3); }
.status-pill.cloud { background: rgba(79, 158, 255, 0.12); color: var(--accent); border-color: rgba(79, 158, 255, 0.3); }
.status-pill.deleted { background: rgba(248, 113, 113, 0.12); color: var(--bad); border-color: rgba(248, 113, 113, 0.3); }

.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; display: none; align-items: center; justify-content: center; }
.modal-bg.show { display: flex; }
.modal { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 20px; min-width: 420px; max-width: 80vw; max-height: 80vh; overflow-y: auto; }
.modal h3 { margin-bottom: 12px; }
.modal .row { display: flex; gap: 8px; align-items: center; margin: 8px 0; }
.modal .row label { min-width: 80px; color: var(--text-soft); }
.modal .btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

.toast { position: fixed; bottom: 20px; right: 20px; background: var(--panel); border: 1px solid var(--border); border-left: 3px solid var(--accent); padding: 10px 16px; border-radius: 4px; z-index: 3000; opacity: 0; transform: translateY(10px); transition: 0.2s; pointer-events: none; }
.toast.show { opacity: 1; transform: translateY(0); }
.toast.error { border-left-color: var(--bad); }
.toast.success { border-left-color: var(--good); }

::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
::-webkit-scrollbar-thumb:hover { background: #444; }

.empty { padding: 60px 20px; text-align: center; color: var(--text-dim); }
.empty h2 { margin-bottom: 8px; color: var(--text-soft); }
.empty pre { background: var(--panel2); border: 1px solid var(--border); padding: 12px; border-radius: 4px; text-align: left; max-width: 600px; margin: 16px auto; font-size: 12px; overflow-x: auto; }

.fname { color: var(--text); font-family: "SF Mono", Consolas, monospace; font-size: 11px; }
.fname .cat { color: var(--text-dim); font-size: 10px; }
.meta-col { color: var(--text-soft); font-size: 11px; white-space: nowrap; }
.meta-col b { color: var(--text); }
.actions { display: flex; gap: 3px; flex-wrap: wrap; }
.actions button { font-size: 11px; padding: 2px 5px; }

.bulk-bar { background: var(--panel); border: 1px solid var(--accent); border-radius: 4px; padding: 8px 12px; margin: 8px 16px; display: none; align-items: center; gap: 10px; }
.bulk-bar.show { display: flex; }
.bulk-bar span { color: var(--text-soft); font-size: 12px; }

.row-cb { text-align: center; }
.row-cb input { cursor: pointer; }
</style>
</head>
<body>

<div class="topbar">
  <h1>⚡ 曼纽考 视频素材库</h1>
  <div class="stats" id="stats"></div>
  <div class="grow"></div>
  <input class="search" id="search" placeholder="搜索文件名/描述/标签…">
  <button onclick="reload()">↻ 重新加载</button>
  <button onclick="showImport()">导入</button>
  <button onclick="exportJSON()" class="primary">导出备份</button>
  <button onclick="showHelp()">?</button>
</div>

<div class="tabs" id="tabs"></div>

<div class="toolbar">
  <label>时长</label>
  <select id="filter-dur">
    <option value="">全部</option>
    <option value="0-5">0-5秒</option>
    <option value="5-15">5-15秒</option>
    <option value="15-60">15-60秒</option>
    <option value="60-300">1-5分钟</option>
    <option value="300-99999">5分钟以上</option>
  </select>
  <label>复用</label>
  <select id="filter-reuse">
    <option value="">全部</option>
    <option value="0">未使用</option>
    <option value="1-2">用过1-2次</option>
    <option value="3-9">常用(3-9)</option>
    <option value="10-99999">高频(10+)</option>
  </select>
  <label>状态</label>
  <select id="filter-status">
    <option value="">全部</option>
    <option value="new">新增未编辑</option>
    <option value="empty">描述为空</option>
    <option value="local">本地</option>
    <option value="cloud">已传云</option>
    <option value="deleted">已删本地</option>
  </select>
  <label>排序</label>
  <select id="sort">
    <option value="filename">文件名</option>
    <option value="duration">时长↓</option>
    <option value="size">大小↓</option>
    <option value="reuse_desc">复用↓</option>
    <option value="reuse_asc">复用↑</option>
    <option value="mtime">添加时间</option>
    <option value="last_used">最近使用</option>
  </select>
  <div class="grow" style="flex:1"></div>
  <span id="filter-cnt" style="color:var(--text-dim);font-size:12px"></span>
  <button class="sm" onclick="toggleBulk()" id="bulk-btn">批量操作</button>
</div>

<div class="bulk-bar" id="bulk-bar">
  <span id="bulk-cnt">已选 0 项</span>
  <button class="sm" onclick="bulkStatus('local')">标为本地</button>
  <button class="sm" onclick="bulkStatus('cloud')">标为已传云</button>
  <button class="sm" onclick="bulkStatus('deleted')">标为已删</button>
  <button class="sm" onclick="bulkReuse(1)">复用+1</button>
  <button class="sm" onclick="bulkClear()">取消选择</button>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th style="width:30px" class="row-cb" id="th-cb" style="display:none"><input type="checkbox" onchange="toggleAll(this)"></th>
        <th style="width:120px">文件名</th>
        <th style="width:90px">时长</th>
        <th style="width:70px">大小</th>
        <th style="width:80px">状态</th>
        <th>描述</th>
        <th style="width:120px">标签</th>
        <th style="width:100px">复用次数</th>
        <th style="width:80px">最后使用</th>
        <th style="width:140px">备注</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

<div class="toast" id="toast"></div>

let baseData = { items: [] };
let userData = {};
let currentCat = '';
let bulkMode = false;
let bulkSel = new Set();

const STORAGE_KEY = 'maniu_kao_v1';

function loadUser() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) userData = JSON.parse(s);
  } catch (e) { userData = {}; }
}
function saveUser() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(userData)); }
  catch (e) { toast('保存失败：' + e.message, 'error'); }
}

function getItem(id) {
  const base = baseData.items.find(x => x.id === id);
  if (!base) return null;
  return { ...base, ...(userData[id] || {}) };
}

function setUserField(id, field, value) {
  if (!userData[id]) userData[id] = {};
  userData[id][field] = value;
  saveUser();
}

async function reload() {
  // 优先用内嵌数据（双击打开也能用）
  if (INVENTORY_EMBEDDED && INVENTORY_EMBEDDED.items && INVENTORY_EMBEDDED.items.length) {
    baseData = INVENTORY_EMBEDDED;
  } else {
    // 回退：尝试 fetch（http 服务模式下）
    try {
      const r = await fetch('./.workbuddy/data/inventory.json?_=' + Date.now());
      if (!r.ok) throw new Error('HTTP ' + r.status);
      baseData = await r.json();
    } catch (e) {
      showEmpty('无法读取素材数据\n\n原因：' + e.message + '\n\n解决方法：\n双击运行 .workbuddy\\scan_inventory.py 重新扫描\n它会自动把数据写进这个HTML文件');
      return;
    }
  }
  loadUser();
  // 标记新增（base里有但user里没有的）
  for (const it of baseData.items) {
    if (!userData[it.id]) {
      userData[it.id] = { _new: true, status: 'local', reuse_count: 0, tags: [], note: '', last_used: '' };
    }
  }
  saveUser();
  buildTabs();
  render();
  toast('已加载 ' + baseData.items.length + ' 个视频', 'success');
}

function showEmpty(msg) {
  document.getElementById('tbody').innerHTML = `<tr><td colspan="10"><div class="empty"><h2>还没数据</h2><pre>${msg}</pre></div></td></tr>`;
  document.getElementById('tabs').innerHTML = '';
  document.getElementById('stats').innerHTML = '';
}

function buildTabs() {
  const cats = {};
  for (const it of baseData.items) {
    if (!cats[it.category]) cats[it.category] = { total: 0, used: 0, deleted: 0 };
    cats[it.category].total++;
    const u = userData[it.id] || {};
    if ((u.reuse_count || 0) > 0) cats[it.category].used++;
    if (u.status === 'deleted') cats[it.category].deleted++;
  }
  const tabs = document.getElementById('tabs');
  const catsSorted = Object.keys(cats).sort((a, b) => cats[b].total - cats[a].total);
  const total = baseData.items.length;
  const totalUsed = baseData.items.filter(x => (userData[x.id]?.reuse_count || 0) > 0).length;
  const totalReuse = baseData.items.reduce((s, x) => s + (userData[x.id]?.reuse_count || 0), 0);
  const totalDeleted = baseData.items.filter(x => userData[x.id]?.status === 'deleted').length;
  document.getElementById('stats').innerHTML = `
    <span>共 <b>${total}</b> 个</span>
    <span>已用 <b>${totalUsed}</b> 个</span>
    <span>累计复用 <b>${totalReuse}</b> 次</span>
    <span>已删本地 <b style="color:var(--bad)">${totalDeleted}</b> 个</span>
  `;
  let html = `<button class="tab ${currentCat===''?'active':''}" onclick="selectCat('')">全部<span class="cnt">${total}</span></button>`;
  for (const c of catsSorted) {
    const cl = cats[c];
    const delTag = cl.deleted > 0 ? `·删${cl.deleted}` : '';
    html += `<button class="tab ${currentCat===c?'active':''}" onclick="selectCat('${c}')">${c}<span class="cnt">${cl.total}·用${cl.used}${delTag}</span></button>`;
  }
  tabs.innerHTML = html;
}

function selectCat(c) {
  currentCat = c;
  buildTabs();
  render();
}

function fmtDur(s) {
  if (!s) return '-';
  s = +s;
  const m = Math.floor(s / 60);
  const sec = Math.round(s % 60);
  return m > 0 ? `${m}分${sec.toString().padStart(2,'0')}秒` : `${sec}秒`;
}

function applyFilter(items) {
  const q = (document.getElementById('search').value || '').toLowerCase().trim();
  const dur = document.getElementById('filter-dur').value;
  const reu = document.getElementById('filter-reuse').value;
  const sta = document.getElementById('filter-status').value;
  const sort = document.getElementById('sort').value;
  let r = items;
  if (currentCat) r = r.filter(x => x.category === currentCat);
  if (q) {
    r = r.filter(x => {
      const u = userData[x.id] || {};
      const desc = u.description || x.description || '';
      const tags = (u.tags || []).join(' ');
      return x.filename.toLowerCase().includes(q) ||
             desc.toLowerCase().includes(q) ||
             tags.toLowerCase().includes(q) ||
             x.category.toLowerCase().includes(q);
    });
  }
  if (dur) {
    const [a, b] = dur.split('-').map(Number);
    r = r.filter(x => {
      const d = +x.duration_s;
      if (a === 0) return d < b;
      if (b === 99999) return d >= a;
      return d >= a && d < b;
    });
  }
  if (reu) {
    const [a, b] = reu.split('-').map(Number);
    r = r.filter(x => {
      const n = (userData[x.id]?.reuse_count || 0);
      if (a === 0) return n === 0;
      if (b === 99999) return n >= a;
      return n >= a && n <= b;
    });
  }
  if (sta) {
    if (sta === 'new') r = r.filter(x => userData[x.id]?._new);
    else if (sta === 'empty') r = r.filter(x => {
      const d = userData[x.id]?.description ?? x.description ?? '';
      return d.includes('待补充') || d.trim() === '';
    });
    else r = r.filter(x => (userData[x.id]?.status || 'local') === sta);
  }
  r.sort((a, b) => {
    const ua = userData[a.id] || {}, ub = userData[b.id] || {};
    switch (sort) {
      case 'duration': return (+b.duration_s) - (+a.duration_s);
      case 'size': return (+b.size_mb) - (+a.size_mb);
      case 'reuse_desc': return (ub.reuse_count||0) - (ua.reuse_count||0);
      case 'reuse_asc': return (ua.reuse_count||0) - (ub.reuse_count||0);
      case 'mtime': return (b.mtime || '').localeCompare(a.mtime || '');
      case 'last_used': return (ub.last_used || '').localeCompare(ua.last_used || '');
      default: return a.filename.localeCompare(b.filename);
    }
  });
  return r;
}

function render() {
  const items = applyFilter([...baseData.items]);
  document.getElementById('filter-cnt').textContent = `显示 ${items.length} 条`;
  if (items.length === 0) {
    document.getElementById('tbody').innerHTML = `<tr><td colspan="10"><div class="empty"><h2>没数据</h2><p>切其他分类或改筛选条件</p></div></td></tr>`;
    return;
  }
  const showCB = bulkMode;
  const html = items.map(it => {
    const u = userData[it.id] || {};
    const desc = u.description ?? it.description ?? '';
    const empty = !desc || desc.includes('待补充');
    const reuse = u.reuse_count || 0;
    const tags = u.tags || [];
    const lastUsed = u.last_used || '';
    const note = u.note || '';
    const isNew = u._new;
    const status = u.status || 'local';
    const isDeleted = status === 'deleted';
    const checked = bulkSel.has(it.id) ? 'checked' : '';
    const statusPill = `<span class="status-pill ${status}" onclick="cycleStatus('${it.id}')" title="点击切换状态">${{local:'本地',cloud:'已传云',deleted:'已删'}[status]}</span>`;
    const cb = showCB ? `<td class="row-cb"><input type="checkbox" ${checked} onchange="toggleRow('${it.id}', this.checked)"></td>` : '';
    return `<tr class="${isNew?'new':''} ${isDeleted?'deleted':''}" data-id="${it.id}">
      ${cb}
      <td><div class="fname">${it.filename}</div><div class="fname"><span class="cat">${it.category}</span></div></td>
      <td class="meta-col"><b>${fmtDur(it.duration_s)}</b><br>${it.width?it.width+'×'+it.height:'-'} · ${it.fps||'-'}fps</td>
      <td class="meta-col">${it.size_text}</td>
      <td>${statusPill}</td>
      <td class="desc-cell"><div class="desc" contenteditable="true" data-empty="${empty}" onblur="onDescBlur('${it.id}', this)" onkeydown="onDescKey(event, this)">${escapeHtml(desc)}</div></td>
      <td>${renderTags(it.id, tags)}</td>
      <td><div class="reuse ${reuse===0?'zero':reuse>=5?'hot':''}">
        <button onclick="adjReuse('${it.id}', -1)">−</button>
        <span class="cnt">${reuse}</span>
        <button onclick="adjReuse('${it.id}', 1)">+</button>
      </div></td>
      <td class="meta-col">${lastUsed || '<span style="color:var(--text-dim)">—</span>'}</td>
      <td><div class="note" contenteditable="true" onblur="onNoteBlur('${it.id}', this)" data-placeholder="备注…">${escapeHtml(note)}</div></td>
    </tr>`;
  }).join('');
  document.getElementById('tbody').innerHTML = html;
  // 显示/隐藏表头checkbox列
  document.getElementById('th-cb').style.display = showCB ? '' : 'none';
}

function renderTags(id, tags) {
  let html = tags.map((t, i) => `<span class="tag" onclick="removeTag('${id}', ${i})" title="点击删除">${escapeHtml(t)}</span>`).join('');
  html += `<span class="tag add" onclick="addTag('${id}')">+ 标签</span>`;
  return html;
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* === 编辑事件 === */
function onDescBlur(id, el) {
  const v = el.innerText.trim();
  setUserField(id, 'description', v);
  el.dataset.empty = (!v || v.includes('待补充')) ? 'true' : 'false';
  if (userData[id]?._new) { delete userData[id]._new; saveUser(); buildTabs(); }
  toast('描述已保存', 'success');
}
function onDescKey(e, el) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); el.blur(); }
  if (e.key === 'Escape') { e.preventDefault(); el.blur(); }
}
function onNoteBlur(id, el) {
  setUserField(id, 'note', el.innerText.trim());
  toast('备注已存', 'success');
}

function adjReuse(id, delta) {
  const u = userData[id] || {};
  const cur = u.reuse_count || 0;
  const next = Math.max(0, cur + delta);
  setUserField(id, 'reuse_count', next);
  if (delta > 0) {
    setUserField(id, 'last_used', new Date().toISOString().slice(0, 10));
  }
  buildTabs();
  render();
}

function cycleStatus(id) {
  const order = ['local', 'cloud', 'deleted'];
  const cur = userData[id]?.status || 'local';
  const next = order[(order.indexOf(cur) + 1) % order.length];
  setUserField(id, 'status', next);
  buildTabs();
  render();
  const labels = { local: '本地', cloud: '已传云', deleted: '已删本地' };
  toast(`状态：${labels[next]}`, 'success');
}

function addTag(id) {
  const t = prompt('输入标签（多个用逗号分隔）：');
  if (!t) return;
  const u = userData[id] || {};
  const newTags = t.split(/[,，]/).map(s => s.trim()).filter(Boolean);
  setUserField(id, 'tags', [...(u.tags || []), ...newTags]);
  render();
}
function removeTag(id, i) {
  const u = userData[id] || {};
  const tags = [...(u.tags || [])];
  tags.splice(i, 1);
  setUserField(id, 'tags', tags);
  render();
}

/* === 批量操作 === */
function toggleBulk() {
  bulkMode = !bulkMode;
  if (!bulkMode) bulkSel.clear();
  document.getElementById('bulk-bar').classList.toggle('show', bulkMode);
  document.getElementById('bulk-btn').textContent = bulkMode ? '退出批量' : '批量操作';
  render();
}
function toggleRow(id, checked) {
  if (checked) bulkSel.add(id); else bulkSel.delete(id);
  updateBulkCnt();
}
function toggleAll(cb) {
  const items = applyFilter([...baseData.items]);
  if (cb.checked) items.forEach(it => bulkSel.add(it.id));
  else items.forEach(it => bulkSel.delete(it.id));
  render();
  updateBulkCnt();
}
function updateBulkCnt() {
  document.getElementById('bulk-cnt').textContent = `已选 ${bulkSel.size} 项`;
}
function bulkStatus(status) {
  if (bulkSel.size === 0) return toast('没选任何项', 'error');
  for (const id of bulkSel) setUserField(id, 'status', status);
  buildTabs();
  render();
  toast(`已批量设置 ${bulkSel.size} 项`, 'success');
}
function bulkReuse(delta) {
  if (bulkSel.size === 0) return toast('没选任何项', 'error');
  const today = new Date().toISOString().slice(0, 10);
  for (const id of bulkSel) {
    const cur = userData[id]?.reuse_count || 0;
    setUserField(id, 'reuse_count', Math.max(0, cur + delta));
    if (delta > 0) setUserField(id, 'last_used', today);
  }
  buildTabs();
  render();
  toast(`复用 ${delta > 0 ? '+' : ''}${delta} × ${bulkSel.size} 项`, 'success');
}
function bulkClear() {
  bulkSel.clear();
  render();
  updateBulkCnt();
}

/* === 导入导出 === */
function exportJSON() {
  const out = {
    exported: new Date().toISOString(),
    base_generated: baseData.generated,
    user: userData,
  };
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `曼纽考_素材数据_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  toast('已导出JSON备份', 'success');
}

function showImport() {
  const m = document.getElementById('modal');
  m.innerHTML = `
    <h3>导入数据</h3>
    <p style="color:var(--text-soft);margin-bottom:12px">导入前请先导出当前数据作为备份。合并模式会保留现有数据，仅补充新内容。</p>
    <input type="file" id="imp-file" accept=".json">
    <div class="row"><label><input type="radio" name="imp-mode" value="merge" checked> 合并（推荐）</label></div>
    <div class="row"><label><input type="radio" name="imp-mode" value="overwrite"> 覆盖（清空当前）</label></div>
    <div class="btns">
      <button onclick="closeModal()">取消</button>
      <button class="primary" onclick="doImport()">导入</button>
    </div>
  `;
  document.getElementById('modal-bg').classList.add('show');
}
function doImport() {
  const f = document.getElementById('imp-file').files[0];
  if (!f) return toast('请选文件', 'error');
  const mode = document.querySelector('input[name="imp-mode"]:checked').value;
  const r = new FileReader();
  r.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      const incoming = d.user || {};
      if (mode === 'overwrite') userData = { ...incoming };
      else userData = { ...userData, ...incoming };
      saveUser();
      buildTabs(); render();
      closeModal();
      toast('导入成功', 'success');
    } catch (err) { toast('导入失败：' + err.message, 'error'); }
  };
  r.readAsText(f);
}
function closeModal() { document.getElementById('modal-bg').classList.remove('show'); }

let toastTimer = null;
function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

['search', 'filter-dur', 'filter-reuse', 'filter-status', 'sort'].forEach(id => {
  document.getElementById(id).addEventListener('input', render);
  document.getElementById(id).addEventListener('change', render);
});

reload();
